security:
  password_hashers:
    App\Entity\Admin: 'auto'
    App\Entity\School: 'auto'

  providers:
    admin_provider:
      entity:
        class: App\Entity\Admin
        property: username
    school_provider:
      entity:
        class: App\Entity\School
        property: schoolCode
    chain_provider:
      chain:
        providers: [admin_provider, school_provider]

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false
    api:
      pattern: ^/api
      stateless: true
      provider: chain_provider
      jwt: ~

  access_control:
    - { path: ^/api, roles: PUBLIC_ACCESS, methods: [OPTIONS] }
    - { path: ^/api/admin/login, roles: PUBLIC_ACCESS }
    - { path: ^/api/school/login, roles: PUBLIC_ACCESS }
    - { path: ^/api/admin, roles: ROLE_ADMIN }
    - { path: ^/api/school, roles: ROLE_SCHOOL }
